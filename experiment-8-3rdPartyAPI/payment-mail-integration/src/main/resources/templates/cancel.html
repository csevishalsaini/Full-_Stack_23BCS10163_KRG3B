<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Cancelled</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        /* Glass card */
        .container {
            width: 360px;
            padding: 40px 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h2 {
            color: #f87171;
            margin-bottom: 15px;
            font-weight: 500;
        }

        p {
            color: #cbd5f5;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #6366f1;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #4f46e5;
            box-shadow: 0 10px 20px rgba(99,102,241,0.3);
            transform: translateY(-1px);
        }

        /* Link */
        a {
            display: block;
            margin-top: 15px;
            color: #a5b4fc;
            font-size: 13px;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Glow */
        .container::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            background: linear-gradient(120deg, transparent, rgba(99,102,241,0.3), transparent);
            z-index: -1;
            filter: blur(20px);
            opacity: 0.5;
        }
        .btn-secondary {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #a5b4fc;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: rgba(99,102,241,0.2);
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Payment Cancelled ❌</h2>
    <p>Your payment was not completed. You can try again anytime.</p>


    <button class="btn-secondary" onclick="goToLogin()">Go to Login</button>

</div>
<script>
    function goToLogin() {
        window.location.href = "/login";
    }
</script>


</body>
</html>
