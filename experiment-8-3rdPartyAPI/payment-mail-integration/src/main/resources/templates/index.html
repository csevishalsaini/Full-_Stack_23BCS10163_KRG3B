<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Product Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        h1 {
            color: white;
            font-weight: 500;
        }

        /* Glass card */
        .product-card {
            max-width: 300px;
            margin: auto;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Glow effect */
        .product-card::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            background: linear-gradient(120deg, transparent, rgba(99,102,241,0.3), transparent);
            z-index: -1;
            filter: blur(20px);
            opacity: 0.5;
        }

        .product-image {
            height: 200px;
            object-fit: cover;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: white;
        }

        .product-price {
            color: #cbd5f5;
        }

        /* Quantity controls */
        .quantity-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .quantity-controls button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .quantity-controls button:hover {
            background: #6366f1;
        }

        .quantity-display {
            width: 50px;
            text-align: center;
            border: none;
            background: transparent;
            color: white;
        }

        /* Button */
        .checkout-button {
            background: #6366f1;
            border: none;
            border-radius: 10px;
            color: white;
            transition: 0.3s;
        }

        .checkout-button:hover {
            background: #4f46e5;
            box-shadow: 0 10px 20px rgba(99,102,241,0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">Explore Our Products</h1>
    <div class="row justify-content-center">
        <!-- Product 1 -->
        <div class="col-md-4 mb-4">
            <div class="card product-card" data-name="Smartphone" data-price="10000000" data-image="/images/smartphone.jpg">
                <img src="/images/smartphone.jpg" class="card-img-top product-image" alt="Smartphone">
                <div class="card-body text-center">
                    <h5 class="product-title">Smartphone</h5>
                    <p class="product-price">Price: ₹1,00,000.00</p>
                    <div class="quantity-controls my-3">
                        <button class="btn btn-outline-secondary decrement">-</button>
                        <input type="text" class="quantity-display form-control" value="1" readonly>
                        <button class="btn btn-outline-secondary increment">+</button>
                    </div>
                    <button class="btn btn-primary btn-lg w-100 checkout-button">Checkout</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-4 mb-4">
            <div class="card product-card" data-name="Headphones" data-price="5000000" data-image="/images/headphones.jpg">
                <img src="/images/headphones.jpg" class="card-img-top product-image" alt="Headphones">
                <div class="card-body text-center">
                    <h5 class="product-title">Headphones</h5>
                    <p class="product-price">Price: ₹50,000.00</p>
                    <div class="quantity-controls my-3">
                        <button class="btn btn-outline-secondary decrement">-</button>
                        <input type="text" class="quantity-display form-control" value="1" readonly>
                        <button class="btn btn-outline-secondary increment">+</button>
                    </div>
                    <button class="btn btn-primary btn-lg w-100 checkout-button">Checkout</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-4 mb-4">
            <div class="card product-card" data-name="Laptop" data-price="11500000" data-image="/images/laptop.jpg">
                <img src="/images/laptop.jpg" class="card-img-top product-image" alt="Laptop">
                <div class="card-body text-center">
                    <h5 class="product-title">Laptop</h5>
                    <p class="product-price">Price: ₹1,15,000.00</p>
                    <div class="quantity-controls my-3">
                        <button class="btn btn-outline-secondary decrement">-</button>
                        <input type="text" class="quantity-display form-control" value="1" readonly>
                        <button class="btn btn-outline-secondary increment">+</button>
                    </div>
                    <button class="btn btn-primary btn-lg w-100 checkout-button">Checkout</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const stripe = Stripe("pk_test_51TEMCRFITHTW32C6RwSle9qa4Xb5sDnjyzXogIME9Paj40o1k1adjF1jjpxorXPjfRH6mZOS7zonHfBlfDnkTZCG00w5plbMdv");

    document.querySelectorAll(".product-card").forEach(card => {
        const decrementBtn = card.querySelector(".decrement");
        const incrementBtn = card.querySelector(".increment");
        const quantityDisplay = card.querySelector(".quantity-display");
        const productPriceDisplay = card.querySelector(".product-price");
        const productPriceInCents = parseInt(card.dataset.price); // Price in cents

        // Quantity decrement logic
        decrementBtn.addEventListener("click", () => {
            let quantity = parseInt(quantityDisplay.value);
            if (quantity > 1) {
                quantity -= 1;
                quantityDisplay.value = quantity;

                // Update the price display
                const totalPrice = (productPriceInCents * quantity) / 100;
                productPriceDisplay.textContent = `Price: ₹${totalPrice.toLocaleString("en-IN", {
                    minimumFractionDigits: 2
                })}`;
            }
        });

        // Quantity increment logic
        incrementBtn.addEventListener("click", () => {
            let quantity = parseInt(quantityDisplay.value);
            quantity += 1;
            quantityDisplay.value = quantity;

            // Update the price display
            const totalPrice = (productPriceInCents * quantity) / 100;
            productPriceDisplay.textContent = `Price: ₹${totalPrice.toLocaleString("en-IN", {
                minimumFractionDigits: 2
            })}`;
        });

        // Checkout button logic
        card.querySelector(".checkout-button").addEventListener("click", async () => {
            const productName = card.dataset.name; // Product name
            const quantity = parseInt(quantityDisplay.value); // Quantity selected

            try {
                // Create the DTO object to match backend fields
                const createPaymentRequest = {
                    name: productName, // Product name
                    amount: productPriceInCents, // Total amount in cents (Stripe expects cents)
                    quantity // Quantity
                };

                // Send request to backend
                const response = await fetch("/product/v1/checkout", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(createPaymentRequest)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Assuming the backend responds with the sessionId and httpStatus
                const stripeResponse = await response.json();

                // Redirect to Stripe Checkout
                const result = await stripe.redirectToCheckout({ sessionId: stripeResponse.sessionId });
                if (result.error) {
                    console.error("Stripe Checkout Error:", result.error.message);
                }
            } catch (error) {
                console.error("Error during checkout:", error);
            }
        });
    });

</script>

</body>
</html>
