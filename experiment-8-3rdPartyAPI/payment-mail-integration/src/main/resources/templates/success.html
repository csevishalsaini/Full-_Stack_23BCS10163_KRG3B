<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Success</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            overflow: hidden;
        }

        .container {
            width: 360px;
            padding: 45px 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            z-index: 2;

            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .container::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            background: linear-gradient(120deg, transparent, rgba(99,102,241,0.3), transparent);
            z-index: -1;
            filter: blur(20px);
            opacity: 0.5;
        }

        .checkmark {
            font-size: 55px;
            color: #22c55e;
            margin-bottom: 15px;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h1 {
            color: white;
            font-weight: 500;
            margin-bottom: 10px;
        }

        p {
            color: #cbd5f5;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .highlight {
            color: #22c55e;
            font-weight: 500;
        }

        .countdown {
            margin-top: 15px;
            font-size: 13px;
            color: #a5b4fc;
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #22c55e;
            opacity: 0.8;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="checkmark">✔</div>

    <h1>Payment Successful!</h1>

    <p>Your payment has been <span class="highlight">successfully completed</span>.</p>
    <p>Thank you for your trust! 🎉</p>

    <div class="countdown">
        Redirecting to home in <span id="timer">5</span> seconds...
    </div>

</div>

<script>
    // Countdown redirect
    let time = 15;
    const timerEl = document.getElementById("timer");

    const countdown = setInterval(() => {
        time--;
        timerEl.innerText = time;

        if (time <= 0) {
            clearInterval(countdown);
            window.location.href = "/";
        }
    }, 1000);

    // Confetti generator
    for (let i = 0; i < 40; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.animationDuration = (2 + Math.random() * 3) + "s";
        confetti.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
        document.body.appendChild(confetti);
    }
</script>

</body>
</html>
